<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src = "script.js"></script>
    <style>

        body {
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
        }

        .Calculator {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            width: 500px;
            height: 600px;
            padding: 20px;
            border: 2px solid black;
            border-radius: 25px;
            background: grey;
        }

        .Calculator > .Visor {
            width: 95%;
            height: 25%;
            background: black;
            color: white;
            padding: 5px;
        }
        
        .Calculator .Buttons {
            display: grid;
            grid-template-columns: 80% 20%;
            height: 75%;
            width: 90%;
            padding: 5px;
        }

        .Calculator .Buttons > div {
            gap: 5px;
            padding: 5px;
        }

        .Calculator .Numbers {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            background: rgb(191, 194, 35);
            box-shadow: 1px 1px 10px yellow;
        }

        .Calculator .Numbers > button {
            font-size: 25px;
            background: none;
            text-shadow: 1px 1px black;
            border: 1px solid black;
            box-shadow: 1px 1px black;
        }


        .Calculator .Numbers > button:hover {
            background: yellow;
            cursor: pointer;
        }

        .Calculator .Numbers > button:nth-child(11) {
            grid-column: 2/4;
        }

        .Calculator .Operators {
            display: grid;
            grid-template-rows: repeat(4, 1fr);
        }

        .Calculator .Operators > button {
            font-size: 25px;
            color: white;
            background: black;
        }

        .Calculator .Operators > button:hover {
            cursor: pointer;   
            background: white;
            color: black;
        }   


        .Calculator .Delete {
            display: flex;
            justify-content: start;
            align-items: center;
            width: 90%;
            height: 10%;
            padding: 2%;

        }

        .Calculator .Delete > button {
            display: flex;
            justify-content: center;            
            border: none;
            width: 100px;
            height: 100%;
            font-size: 25px;
            font-weight: bolder;
            border-radius: 15px;
            text-shadow: 1px 1px black;
            box-shadow: 1px 1px black;
            color: white;
            background: rgb(163, 38, 38);
        }

        .Calculator .Delete > button:hover {
            background: red;
            cursor: pointer;
        }
        


    </style>
</head>
<body>
    <div class = 'Calculator'>
        <div class = 'Visor'>
            <div class = 'Actual'></div>
        </div>
        <div class = 'Delete'> <button class = 'Delete'>AC</button> </div>
        <div class = 'Buttons'>
            <div class = 'Numbers'>
                <button value = '7'>7</button>
                <button value = '8' class = 'Number'>8</button>
                <button value = '9' class = 'Number'>9</button>
                <button value = '4' class = 'Number'>4</button>
                <button value = '5' class = 'Number'>5</button>
                <button value = '6' class = 'Number'>6</button>
                <button value = '1' class = 'Number'>1</button>
                <button value = '2' class = 'Number'>2</button>
                <button value = '3' class = 'Number'>3</button>
                <button value = '0' class = 'Number'>0</button>
                <button value = '=' class = 'Operator Equal'>=</button>
            </div>
            <div class = 'Operators'>
                <button value = '+' class = 'Operator'>+</button>
                <button value = '-' class = 'Operator'>-</button>
                <button value = '*' class = 'Operator'>*</button>
                <button value = '/' class = 'Operator'>/</button>
            </div>
        </div>
    </div>
</body>
</html>
