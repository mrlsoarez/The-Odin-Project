<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do</title>
  <link rel = "stylesheet" href = "../src/styles.css">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <script type = "module" src = "index.js"> </script>
<script defer src="main.js"></script></head>
<body>
  <main>
    <div class = 'Panel'>
      <button class = 'Panel-Button' id = 'home'> <i class='bx bx-home' ></i> </button>
      <button class = 'Panel-Button' id = 'calendar'> <i class='bx bxs-calendar' ></i> </button>
    </div>
    <div class = 'Content'></div>
  </main>
    <dialog class = 'Add' open>
      <form>
        <section>
          <label><i class='bx bx-task'></i></label>
          <input id = 'project' type = 'text' placeholder = 'Digite o nome do projeto' name = 'task'>
        </section>
        <section>
          <label><i class='bx bx-task'></i></label>
          <input type = 'date' name = 'date'>
        </section>
        <section>
          <label><i class='bx bx-task'></i></label>
          <textarea name = 'description'></textarea>
        </section>
        <section>
          <label><i class='bx bxs-color'></i></label>
          <select name = 'icon'>
            <option>&#128540</option>
            <option> B </option>
          </select>
        </section>
      
        <section id = 'submit-box'>
          <input id = 'submit' type = 'submit' value = 'Criar projeto'>
        </section>
      </form>
      <button id = 'close'>X</button>
    </dialog>
</body>

</html>
